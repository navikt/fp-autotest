name: Scheduled allure report
on:
  schedule:
    - cron: '0 2 * * 2'
  workflow_dispatch:

jobs:
  autotest:
    name: Kjører autotest
    permissions:
      id-token: write
      pages: write
    runs-on: 'ubuntu-latest-8-cores'
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: ${{ github.actor }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # ratchet:actions/setup-java@v5.4.0
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Login GAR
        uses: nais/login@bb6c3e1e14e53d40d69d0d092bd2fce2e39ae3bf # ratchet:nais/login@v0
        with:
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          team: teamforeldrepenger
      - name: Setup keystore
        shell: bash
        run: |
          cd pipeline/keystore
          ./make-dummy-keystore.sh
      - name: Setup fpsak og dens avhengigheter
        id: setup
        shell: bash
        run: |
          services=("fpsak" "fpformidling" "fpdokgen" "fpoppdrag" "fptilbake" "fprisk" "fpmottak" "fpsoknad" "fpoversikt" "fpkalkulus" "fpinntektsmelding" "fplos" "fpinntektsmeldingapi")
          cd pipeline
          ./update-versions.sh
          echo "Kjører docker compose up på følgende applikasjoner: ${services[*]}"
          docker compose -f compose.yml -f compose-github.yml pull --quiet "${services[@]}"
          docker stop $(docker ps -a -q) || docker rm $rm $(docker ps -a -q)
          docker compose -f compose.yml -f compose-github.yml up --wait "${services[@]}" || (docker ps ; echo "Oppstart feilet. Se etter tjenester som er \"unhealthy\" eller \"restarting\" i listen over." ; exit 1)

      - name: Tester - verdikjede
        shell: bash
        run: mvn test -e --batch-mode -Djuipter.parallelism=8 -P verdikjede
      - name: Tester - fpsak
        shell: bash
        run: mvn test -e --batch-mode -Djuipter.parallelism=8 -P fpsak
      - name: Tester - fptilbake
        shell: bash
        run: mvn test -e --batch-mode -Djuipter.parallelism=8 -P fptilbake
      - name: Tester - fplos
        shell: bash
        run: mvn test -e --batch-mode -Djuipter.parallelism=8 -P fplos
      - name: Tester - fpkalkulus
        shell: bash
        run: mvn test -e --batch-mode -Djuipter.parallelism=8 -P fpkalkulus

      - name: Lager testrapport
        run: mvn allure:report --batch-mode

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # ratchet:actions/configure-pages@v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # ratchet:actions/upload-pages-artifact@v5.0.0
        with:
          path: ./target/allure-report
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # ratchet:actions/deploy-pages@v5.0.0
        id: deployment
