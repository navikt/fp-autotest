name: Scheduled allure report
on:
  schedule:
    - cron: '0 2 * * 2'
  workflow_dispatch:

jobs:
  autotest:
    name: Kjører autotest
    permissions:
      id-token: write
      pages: write
    runs-on: 'ubuntu-latest-8-cores'
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: ${{ github.actor }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v4
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Login GAR
        uses: nais/login@e7cf2c159677dc7c7d599feff5f808f2bf59c7cf # ratchet:nais/login@v0
        with:
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          team: teamforeldrepenger
      - name: Setup keystore
        shell: bash
        run: |
          cd pipeline/keystore
          ./make-dummy-keystore.sh
      - name: Setup fpsak og dens avhengigheter
        id: setup
        shell: bash
        run: |
          services=("fpsak" "fpformidling" "fpdokgen" "fpoppdrag" "fptilbake" "fprisk" "fpmottak" "fpsoknad" "fpoversikt" "fpkalkulus" "fpinntektsmelding" "fplos")
          cd pipeline
          ./update-versions.sh
          echo "Kjører docker compose up på følgende applikasjoner: ${services[*]}"
          docker compose -f compose.yml -f compose-github.yml pull --quiet "${services[@]}"
          docker stop $(docker ps -a -q) || docker rm $rm $(docker ps -a -q)
          docker compose -f compose.yml -f compose-github.yml up --wait "${services[@]}" || (docker ps ; echo "Oppstart feilet. Se etter tjenester som er \"unhealthy\" eller \"restarting\" i listen over." ; exit 1)

      - name: Tester - verdikjede
        shell: bash
        run: mvn test -e --batch-mode -Djuipter.parallelism=8 -P verdikjede
      - name: Tester - fpsak
        shell: bash
        run: mvn test -e --batch-mode -Djuipter.parallelism=8 -P fpsak
      - name: Tester - fptilbake
        shell: bash
        run: mvn test -e --batch-mode -Djuipter.parallelism=8 -P fptilbake
      - name: Tester - fplos
        shell: bash
        run: mvn test -e --batch-mode -Djuipter.parallelism=8 -P fplos
      - name: Tester - fpkalkulus
        shell: bash
        run: mvn test -e --batch-mode -Djuipter.parallelism=8 -P fpkalkulus

      - name: Lager testrapport
        run: mvn allure:report --batch-mode

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # ratchet:actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # ratchet:actions/upload-pages-artifact@v4
        with:
         path: ./target/allure-report
      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # ratchet:actions/deploy-pages@v4
        id: deployment
