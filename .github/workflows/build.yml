name: Kjører Autotestene ved bygg

on:
  push:
    branches:
      - '**'
    paths:
      - '.github/workflows/build.yml'
      - 'src/**'
      - 'pipeline/**'
      - 'pom.xml'
jobs:
  fpsak-tester:
    name: Fpsak tester
    permissions:
       contents: read
       id-token: write
    if: github.ref_name != 'master'
    uses: navikt/fp-autotest/.github/workflows/autotest.yml@${{ github.ref_name }} # ratchet:exclude
    with:
      test-suite: fpsak
    secrets: inherit

  fptilbake-tester:
    name: Fptilbake tester
    permissions:
       contents: read
       id-token: write
    if: github.ref_name != 'master'
    uses: navikt/fp-autotest/.github/workflows/autotest.yml@${{ github.ref_name }} # ratchet:exclude
    with:
      test-suite: fptilbake
    secrets: inherit

  verdikjede-tester:
    name: Verdikjedetester
    permissions:
       contents: read
       id-token: write
    uses: navikt/fp-autotest/.github/workflows/autotest.yml@${{ github.ref_name }} # ratchet:exclude
    with:
      test-suite: verdikjede
    secrets: inherit
