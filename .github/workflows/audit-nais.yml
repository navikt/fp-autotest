name: Build and deploy nais.audit
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'pipeline/audit.nais/Dockerfile'
      - '.github/workflows/audit-nais.yml'
jobs:
  build:
    name: Build audit.nais mock
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # ratchet:docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # ratchet:docker/setup-buildx-action@v2
      - name: NAIS login
        uses: nais/login@c88ada9ce583928e1c84d2fd5c45cfacdd18d5de # ratchet:nais/login@v0
        id: login
        with:
          team: teamforeldrepenger
      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # ratchet:docker/build-push-action@v4
        with:
          context: pipeline/audit.nais
          platforms: linux/amd64, linux/arm64
          pull: true
          push: true
          tags: ${{ steps.login.outputs.registry }}/${{ github.repository }}/audit-nais-mock:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
