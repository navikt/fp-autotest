name: Build and deploy nais.audit
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'pipeline/audit.nais/Dockerfile'
      - '.github/workflows/audit-nais.yml'
jobs:
  build:
    name: Build audit.nais mock
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # ratchet:docker/setup-qemu-action@v4.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4.1.0
      - name: NAIS login
        uses: nais/login@bb6c3e1e14e53d40d69d0d092bd2fce2e39ae3bf # ratchet:nais/login@v0
        id: login
        with:
          team: teamforeldrepenger
      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # ratchet:docker/build-push-action@v7.2.0
        with:
          context: pipeline/audit.nais
          platforms: linux/amd64, linux/arm64
          pull: true
          push: true
          tags: ${{ steps.login.outputs.registry }}/${{ github.repository }}/audit-nais-mock:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
