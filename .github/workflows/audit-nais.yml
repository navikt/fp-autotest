name: Build and deploy nais.audit
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'pipeline/audit.nais/Dockerfile'
      - '.github/workflows/audit-nais.yml'
jobs:
  build:
    name: Build audit.nais mock
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # ratchet:docker/setup-qemu-action@v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4.1.0
      - name: NAIS login
        uses: nais/login@d6ab5d83f735e9f155eb9d7d29cd20ae46820ea9 # ratchet:nais/login@v0
        id: login
        with:
          team: teamforeldrepenger
      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # ratchet:docker/build-push-action@v7.2.0
        with:
          context: pipeline/audit.nais
          platforms: linux/amd64, linux/arm64
          pull: true
          push: true
          tags: ${{ steps.login.outputs.registry }}/${{ github.repository }}/audit-nais-mock:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
