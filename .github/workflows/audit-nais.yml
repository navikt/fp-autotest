name: Build and deploy nais.audit
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'pipeline/audit.nais/Dockerfile'
      - '.github/workflows/audit-nais.yml'
jobs:
  build:
    name: Build audit.nais mock
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # ratchet:docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # ratchet:docker/setup-buildx-action@v2
      - name: NAIS login
        uses: nais/login@e7cf2c159677dc7c7d599feff5f808f2bf59c7cf # ratchet:nais/login@v0
        id: login
        with:
          team: teamforeldrepenger
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # ratchet:docker/build-push-action@v4
        with:
          context: pipeline/audit.nais
          platforms: linux/amd64, linux/arm64
          pull: true
          push: true
          tags: ${{ steps.login.outputs.registry }}/${{ github.repository }}/audit-nais-mock:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
