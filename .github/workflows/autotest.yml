name: Utfører tester mot SUT
on:
  workflow_call:
    inputs:
      build-version:
        description: 'Docker tag (from repository)'
        type: string
        required: false
        default: 'latest'
      parallellitet:
        description: 'Ønsket parallelitet ved kjøring'
        type: string
        required: false
        default: '8'
      test-suite:
        description: 'Test suite å kjøre (fpsak|fptilbake|fpkalkulus|fplos|verdikjede)'
        type: string
        required: true
    outputs:
      resultat:
        description: "Test resultat"
        value: ${{ jobs.autotest.outputs.result }}
jobs:
  autotest:
    name: Kjører ${{ inputs.test-suite }}-tester mot ${{ github.repository }} ${{ inputs.build-version }}
    permissions:
     id-token: write
    runs-on: ${{ ((github.actor == 'dependabot[bot]' || inputs.test-suite == 'fpkalkulus' || inputs.test-suite == 'fplos') && 'ubuntu-latest') || 'ubuntu-latest-8-cores' }}
    timeout-minutes: 15
    outputs:
      result: ${{ steps.result.outputs.result }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: ${{ github.actor }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v4
        if: github.repository == 'navikt/fp-autotest'
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v4
        if: github.repository != 'navikt/fp-autotest'
        with:
          repository: 'navikt/fp-autotest'
          ref: 'master'
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Cache for maven dependencies autotest
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-autotest-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-autotest
      - name: Login GAR
        uses: nais/login@c88ada9ce583928e1c84d2fd5c45cfacdd18d5de # ratchet:nais/login@v0
        with:
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          team: teamforeldrepenger
      - name: Setup keystore
        shell: bash
        working-directory: pipeline/keystore
        run: ./make-dummy-keystore.sh
      - name: Setup fpsak og dens avhengigheter
        id: setup
        shell: bash
        working-directory: pipeline
        run: |
          if [[ ${{ inputs.test-suite }} == 'fpkalkulus' ]]; then
            services=("fpkalkulus")
          elif [[ ${{ inputs.test-suite }} == 'fplos' ]]; then
            services=("fplos" "fpsak" "fpformidling" "fpdokgen" "fpoppdrag" "fptilbake" "fprisk" "fpmottak" "fpsoknad" "fpkalkulus" "fpinntektsmelding")
          else
            services=("fpsak" "fpformidling" "fpdokgen" "fpoppdrag" "fptilbake" "fprisk" "fpmottak" "fpsoknad" "fpoversikt" "fpkalkulus" "fpinntektsmelding")
          fi

          ./update-versions.sh ${{ github.repository }} ${{ inputs.build-version }}
          echo "Kjører docker compose up på følgende applikasjoner: ${services[*]}"
          docker compose -f compose.yml -f compose-github.yml pull --quiet "${services[@]}"
          docker stop $(docker ps -a -q) || docker rm $rm $(docker ps -a -q)
          docker compose -f compose.yml -f compose-github.yml up --wait "${services[@]}" || (docker ps ; echo "Oppstart feilet. Se etter tjenester som er \"unhealthy\" eller \"restarting\" i listen over." ; exit 1)
      - name: Utfører tester fra test suite ${{ inputs.test-suite }} mot SUT
        id: tester
        shell: bash
        run: mvn test -e --batch-mode -Djuipter.parallelism=${{ inputs.parallellitet }} -P ${{ inputs.test-suite }} > >(tee test-result-log.txt)
      - name: Sjekker loggen etter feil
        if: (success() || failure()) && steps.setup.outcome == 'success'
        id: logger
        shell: bash
        run: |
          if [[ ${{ inputs.test-suite }} == 'fptilbake' ]]; then
            mvn test -e --batch-mode -Djuipter.parallelism=${{ inputs.parallellitet }} -P loggfeil -DikkeSjekkLengdeAvContainer=fpdokgen -DkortHelgeLogg=fpoppdrag
          elif [[ ${{ inputs.test-suite }} == 'verdikjede' ]]; then
            mvn test -e --batch-mode -Djuipter.parallelism=${{ inputs.parallellitet }} -P logger -DikkeSjekkLengdeAvContainer=fpdokgen
          elif [[ ${{ inputs.test-suite }} == 'fplos' ]]; then
            mvn test -e --batch-mode -Djuipter.parallelism=${{ inputs.parallellitet }} -P logger -DikkeSjekkLengdeAvContainer=fpdokgen,fpoppdrag
          elif [[ ${{ inputs.test-suite }} == 'fpsak' ]]; then
            mvn test -e --batch-mode -Djuipter.parallelism=${{ inputs.parallellitet }} -P logger -DikkeSjekkLengdeAvContainer=fpdokgen
          else
            mvn test -e --batch-mode -Djuipter.parallelism=${{ inputs.parallellitet }} -P loggfeil
          fi
      - name: Sjekker minneforbruk
        if: failure() || cancelled()
        run: |
          docker stats --no-stream
          free -m
      - name: Utled testresultat
        if: (success() || failure()) && steps.setup.outcome == 'success'
        id: result
        shell: bash
        run: |
          if [[ ${{ steps.setup.outcome }} == 'success' ]]; then
            echo "result=test-${{ steps.tester.outcome }} logg-${{ steps.logger.outcome }}" >> $GITHUB_OUTPUT
          else
            echo "result=skipped" >> $GITHUB_OUTPUT
          fi

      - name: Dumper logger for feilsøking
        if: failure() || cancelled()
        shell: bash
        run: |
          mkdir container-logs
          cd container-logs
          docker ps -a --format '{{.Names}}' | while read pod; do docker logs $pod > $pod.log 2>&1; done
      - name: Laste opp logger
        if: failure() || cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v4
        with:
          name: logs-${{ inputs.test-suite }}
          path: container-logs
